services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fraud_detection_db}
      MYSQL_USER: ${MYSQL_USER:-fraud_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-fraud123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  ml-engine:
    build:
      context: ./fraud-detection-enginedemo/ml-engine
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ML_ENGINE_MODEL_DIR: /app/model
      ML_ENGINE_MODEL_VERSION: ${ML_ENGINE_MODEL_VERSION:-v2.0}
      ML_ENGINE_DATASET_VERSION: ${ML_ENGINE_DATASET_VERSION:-synthetic-1m}
      ML_ENGINE_THRESHOLD_FILE: /app/model/threshold.txt
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\""]
      interval: 20s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./fraud-detection-enginedemo
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      ml-engine:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-fraud_detection_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-fraud_app}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-fraud123}
      ML_ENGINE_URL: ${ML_ENGINE_URL:-http://ml-engine:8000/predict}
      ML_ENGINE_MODEL_VERSION: ${ML_ENGINE_MODEL_VERSION:-v2.0}
      ML_ENGINE_DATASET_VERSION: ${ML_ENGINE_DATASET_VERSION:-synthetic-1m}
      ML_ENGINE_TIMEOUT_MS: ${ML_ENGINE_TIMEOUT_MS:-3000}
      ML_ENGINE_FALLBACK_MODE: ${ML_ENGINE_FALLBACK_MODE:-ENABLED}
      FRAUD_THRESHOLD: ${FRAUD_THRESHOLD:-0.1049}
      APP_FRONTEND_BASE_URL: ${APP_FRONTEND_BASE_URL:-http://localhost:3000}
      APP_FRONTEND_SIGNUP_URL: ${APP_FRONTEND_SIGNUP_URL:-http://localhost:3000/signup}
      APP_BACKEND_BASE_URL: ${APP_BACKEND_BASE_URL:-http://localhost:3000}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      APP_BOOTSTRAP_ADMIN_ENABLED: ${APP_BOOTSTRAP_ADMIN_ENABLED:-false}
      APP_BOOTSTRAP_ADMIN_EMAIL: ${APP_BOOTSTRAP_ADMIN_EMAIL:-}
      APP_BOOTSTRAP_ADMIN_PASSWORD: ${APP_BOOTSTRAP_ADMIN_PASSWORD:-}
      APP_BOOTSTRAP_ADMIN_NAME: ${APP_BOOTSTRAP_ADMIN_NAME:-System Admin}
      APP_BOOTSTRAP_ADMIN_PHONE: ${APP_BOOTSTRAP_ADMIN_PHONE:-9999999999}
      PLATFORM_DEFAULT_TENANT: ${PLATFORM_DEFAULT_TENANT:-SINGLE_TENANT}
      ALERT_EMAIL_ENABLED: ${ALERT_EMAIL_ENABLED:-false}
      ALERT_EMAIL_FROM: ${ALERT_EMAIL_FROM:-no-reply@detectiq.local}
      ALERT_ADMIN_RECIPIENTS: ${ALERT_ADMIN_RECIPIENTS:-}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS_ENABLED: ${MAIL_SMTP_STARTTLS_ENABLED:-true}
      MAIL_SSL_TRUST: ${MAIL_SSL_TRUST:-}

  frontend:
    build:
      context: ./fraud-dashboard-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-/ws}
        VITE_ML_ENGINE_URL: ${VITE_ML_ENGINE_URL:-/ml/predict}
    restart: unless-stopped
    depends_on:
      - backend
      - ml-engine
    ports:
      - "${FRONTEND_PORT:-3000}:80"

volumes:
  mysql-data: